## 任务分发规则

### 关键词映射
```
→ researcher: 搜索, 调研, 分析, 研究, 对比, 查找, 了解, 收集
→ builder: 开发, 编写, 实现, 写代码, 创建, 制作, 修改, 构建
→ auditor: 检查, 审查, 验证, 测试, 审计, 评估, 排查
```

### 并行策略
- **自动并行**：任务含"同时/分别/并行"或多个无依赖子任务
- **串行执行**：任务含"先/然后/基于/根据"或明确依赖
- **复合任务**：main拆解后并行分发子任务

### 协作模式
1. **完全并行**：多个独立任务同时执行
2. **流水线**：researcher→builder→auditor 顺序依赖
3. **探索-执行**：多方案探索 → main决策 → builder实现 → auditor验证

